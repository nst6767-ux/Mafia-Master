<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mafia Admin</title>
    
    <link rel="apple-touch-icon" href="game.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mafia Admin">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        h1 { color: #ff3b30; text-shadow: 0 0 10px rgba(255, 59, 48, 0.5); }

        .card-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }

        .role-card {
            background: #1c1c1e;
            border: 2px solid #3a3a3c;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .role-card.active {
            border-color: #30d158;
            box-shadow: 0 0 15px rgba(48, 209, 88, 0.4);
            transform: scale(1.05);
        }

        .emoji { font-size: 50px; display: block; margin-bottom: 10px; }
        .role-name { font-weight: bold; font-size: 18px; }
        
        .status {
            margin-top: 30px;
            padding: 15px;
            background: #1c1c1e;
            border-radius: 10px;
            width: 100%;
            max-width: 370px;
            text-align: center;
            font-size: 16px;
            border-left: 5px solid #ff3b30;
        }

        button {
            margin-top: 30px;
            background: #ff3b30;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 59, 48, 0.3);
        }

        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>МАФИЯ</h1>
    
    <div class="card-container">
        <div class="role-card" onclick="toggleRole(this, 'Мафия 😈')">
            <span class="emoji">😈</span>
            <span class="role-name">Мафия</span>
        </div>
        <div class="role-card" onclick="toggleRole(this, 'Шериф 👮‍♂️')">
            <span class="emoji">👮‍♂️</span>
            <span class="role-name">Шериф</span>
        </div>
        <div class="role-card" onclick="toggleRole(this, 'Доктор 👨‍⚕️')">
            <span class="emoji">👨‍⚕️</span>
            <span class="role-name">Доктор</span>
        </div>
        <div class="role-card" onclick="toggleRole(this, 'Любовница 💃')">
            <span class="emoji">💃</span>
            <span class="role-name">Любовница</span>
        </div>
    </div>

    <div class="status" id="statusBox">Выбор ролей...</div>

    <button onclick="resetGame()">Сбросить игру</button>

    <script>
        let selectedRoles = [];

        function toggleRole(element, roleName) {
            element.classList.toggle('active');
            if (element.classList.contains('active')) {
                selectedRoles.push(roleName);
            } else {
                selectedRoles = selectedRoles.filter(r => r !== roleName);
            }
            updateStatus();
        }

        function updateStatus() {
            const statusBox = document.getElementById('statusBox');
            if (selectedRoles.length === 0) {
                statusBox.innerText = "Роли не выбраны";
            } else {
                statusBox.innerText = "В игре: " + selectedRoles.join(', ');
            }
        }

        function resetGame() {
            selectedRoles = [];
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('active'));
            updateStatus();
        }
    </script>
</body>
</html>
