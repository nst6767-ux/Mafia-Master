<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guess Who - Mafia Web</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --neon-red: #ff0000;
            --panel-gray: #2a2a2a;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            background-image: radial-gradient(circle, #1a0000 0%, #0a0a0a 100%);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: var(--neon-red);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-red);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.1rem;
            margin: 15px 0 10px;
            border-bottom: 1px solid var(--neon-red);
            display: inline-block;
            color: var(--neon-red);
            font-weight: bold;
        }

        .roles-container {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 12px;
            align-items: center;
            margin-bottom: 25px;
        }

        .role-icon-box {
            text-align: center;
            font-size: 0.75rem;
            color: #eee;
        }

        .role-emoji {
            font-size: 40px;
            display: block;
            margin-bottom: 5px;
            line-height: 60px;
            height: 60px;
            width: 60px;
            margin: 0 auto 5px;
            border: 1px solid var(--neon-red);
            border-radius: 8px;
            background: rgba(255, 0, 0, 0.1);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .role-input {
            background-color: var(--panel-gray);
            border: 1px solid #555;
            border-radius: 5px;
            padding: 10px;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 5px;
        }

        .mafia-input { height: 80px; }

        .input-wrapper {
            background-color: var(--panel-gray);
            border: 1px solid #555;
            border-radius: 5px;
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 5px;
            box-sizing: border-box;
        }

        .input-label {
            color: #888;
            font-size: 0.85rem;
            margin-right: 10px;
            white-space: nowrap;
        }

        .round-field {
            background: transparent;
            border: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
        }

        input[readonly] { opacity: 0.5; }

        .round-block {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 3px solid var(--neon-red);
        }

        .round-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn-edit {
            color: #ff4d4d;
            font-size: 0.8rem;
            text-decoration: underline;
            padding: 5px;
            cursor: pointer;
        }

        .btn-done {
            background: var(--neon-red);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            margin-top: 5px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .reset-container {
            margin-top: 40px;
            padding-bottom: 60px;
            text-align: center;
        }

        .btn-reset {
            background: none;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            padding: 15px;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #confirm-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .confirm-box {
            background: #1a1a1a;
            border: 2px solid var(--neon-red);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px var(--neon-red);
            width: 80%;
            max-width: 300px;
        }

        .confirm-text { color: #fff; margin-bottom: 20px; font-weight: bold; }
        .confirm-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-modal { padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .btn-yes { background: var(--neon-red); color: #fff; }
        .btn-no { background: #444; color: #fff; }

        #fire-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            display: none;
            pointer-events: none;
            background: radial-gradient(circle, #ff4500, #ff0000, transparent);
        }

        @keyframes burnAnimation {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1.2); }
        }

        .burning { display: block !important; animation: burnAnimation 0.8s ease-out forwards; }
    </style>
</head>
<body>

    <div id="fire-overlay"></div>

    <div id="confirm-overlay">
        <div class="confirm-box">
            <div class="confirm-text">Сжечь все улики?</div>
            <div class="confirm-buttons">
                <button class="btn-modal btn-yes" onclick="confirmReset(true)">Да</button>
                <button class="btn-modal btn-no" onclick="confirmReset(false)">Нет</button>
            </div>
        </div>
    </div>

    <h1>GUESS WHO</h1>

    <div class="section-title">РОЛИ</div>
    <div class="roles-container">
        <div class="role-icon-box"><span class="role-emoji">🔫</span>Мафия</div>
        <div><input type="text" class="role-input mafia-input" id="r-mafia" placeholder="Имена..."><button class="btn-done" onclick="lock('r-mafia')">Готово</button></div>

        <div class="role-icon-box"><span class="role-emoji">💋</span>Шлюха</div>
        <div><input type="text" class="role-input" id="r-love" placeholder="Имя..."><button class="btn-done" onclick="lock('r-love')">Готово</button></div>

        <div class="role-icon-box"><span class="role-emoji">💉</span>Доктор</div>
        <div><input type="text" class="role-input" id="r-doc" placeholder="Имя..."><button class="btn-done" onclick="lock('r-doc')">Готово</button></div>

        <div class="role-icon-box"><span class="role-emoji">🚓</span>Шериф</div>
        <div><input type="text" class="role-input" id="r-sheriff" placeholder="Имя..."><button class="btn-done" onclick="lock('r-sheriff')">Готово</button></div>
    </div>

    <div class="section-title">РАУНДЫ</div>
    <div id="rounds-list"></div>

    <div class="reset-container">
        <button class="btn-reset" onclick="burnAll()">НОВАЯ ИГРА</button>
    </div>

    <script>
        const roundsList = document.getElementById('rounds-list');
        for(let i=1; i<=6; i++) {
            const block = document.createElement('div');
            block.className = 'round-block';
            block.innerHTML = `
                <div class="round-header"><strong>Раунд ${i}</strong><span class="btn-edit" onclick="editR(${i})">ред.</span></div>
                <div class="input-wrapper"><span class="input-label">убит:</span><input type="text" id="r${i}-0" class="round-field field-r${i}"></div>
                <div class="input-wrapper"><span class="input-label">вылечен:</span><input type="text" id="r${i}-1" class="round-field field-r${i}"></div>
                <div class="input-wrapper"><span class="input-label">выебан:</span><input type="text" id="r${i}-2" class="round-field field-r${i}"></div>
                <button class="btn-done" onclick="lockR(${i})">Готово</button>
            `;
            roundsList.appendChild(block);
        }

        function lock(id) { 
            const el = document.getElementById(id); 
            if (id === 'r-sheriff' && el.value.trim() === "") {
                el.value = "нет";
            }
            if(el.value.trim() !== "") { el.readOnly = true; el.blur(); } 
        }
        function lockR(n) { document.querySelectorAll('.field-r'+n).forEach(f => { if(f.value.trim() !== "") f.readOnly = true; }); document.activeElement.blur(); }
        function editR(n) { document.querySelectorAll('.field-r'+n).forEach(f => f.readOnly = false); }
        function burnAll() { document.getElementById('confirm-overlay').style.display = 'flex'; }
        function confirmReset(choice) {
            document.getElementById('confirm-overlay').style.display = 'none';
            if (choice) {
                const fire = document.getElementById('fire-overlay');
                fire.classList.add('burning');
                setTimeout(() => {
                    document.querySelectorAll('input').forEach(i => { i.value = ""; i.readOnly = false; });
                    window.scrollTo({top: 0, behavior: 'smooth'});
                }, 400);
                setTimeout(() => { fire.classList.remove('burning'); }, 800);
            }
        }
    </script>
</body>
</html>
